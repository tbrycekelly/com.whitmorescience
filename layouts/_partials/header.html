<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="{{ .Site.Params.author }}">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="theme-color" content="#062b46">
  <link rel="stylesheet" href="{{ "css/bootstrap.min.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/font-awesome.min.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/hugo-academic-group.css" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  {{ range .Site.Params.custom_css }}
    <link rel="stylesheet" href="{{ printf "css/%s" . | relURL }}{{ with $.Site.Params.asset_version }}?v={{ . }}{{ end }}">
  {{ end }}
  <link rel="canonical" href="{{ .Permalink }}">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Laura M. Whitmore",
    "url": "https://www.whitmorescience.com/",
    "jobTitle": "Oceanographer",
    "email": "mailto:lmwhitmore@alaska.edu",
    "sameAs": ["https://github.com/lmwhitmore"]
  }
  </script>
</head>
<body>
<div class="home-anchor" id="home"></div>
